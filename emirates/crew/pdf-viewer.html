<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emirates Document Center</title>
    <meta name="description" content="Emirates PTFS Document Center — access crew manuals, briefings, and official documents in one place.">

    <!-- Social / Discord embed -->
    <meta property="og:title" content="Emirates Document Center">
    <meta property="og:description" content="Emirates PTFS Document Center — access crew manuals, briefings, and official documents in one place.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Emirates PTFS">
    <meta property="og:image" content="https://cdn.discordapp.com/attachments/1480638674030039040/1480638679528640694/RobloxScreenShot20260309_191023032.png?ex=69b6ff3a&is=69b5adba&hm=dc638040cebcf7e53af1db5c5a9dc5d2d7f9fa8b26857e2ce7164fe562962ebb&">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Emirates Document Center">
    <meta name="twitter:description" content="Emirates PTFS Document Center — access crew manuals, briefings, and official documents in one place.">
    <meta name="twitter:image" content="https://cdn.discordapp.com/attachments/1480638674030039040/1480638679528640694/RobloxScreenShot20260309_191023032.png?ex=69b6ff3a&is=69b5adba&hm=dc638040cebcf7e53af1db5c5a9dc5d2d7f9fa8b26857e2ce7164fe562962ebb&">

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --ek-red: #D71921;
            --ek-red-dark: #b01419;
            --ek-gold: #C6A87C;
            --ek-gold-light: #e0c8a0;
            --ek-dark: #333333;
            --ek-light: #f9f9f9;
            --ek-gray: #666666;
            --panel: #ffffff;
            --shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: var(--ek-dark);
            background:
                radial-gradient(circle at top right, rgba(198, 168, 124, 0.2), transparent 36%),
                linear-gradient(180deg, #fff 0%, #f6f7f8 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        .header {
            height: 64px;
            background: #fff;
            border-bottom: 3px solid var(--ek-red);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: relative;
            z-index: 5;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand img {
            height: 36px;
            width: auto;
        }

        .brand h1 {
            font-size: 13px;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            color: var(--ek-gray);
            border-left: 1px solid #e0e0e0;
            padding-left: 14px;
            margin-left: 8px;
            font-weight: 700;
        }

        .status-wrap {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }

        .status-doc {
            font-size: 13px;
            font-weight: 600;
            color: var(--ek-dark);
            max-width: 320px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .status {
            font-size: 11px;
            color: var(--ek-gray);
            letter-spacing: 0.3px;
        }

        .layout {
            display: grid;
            grid-template-columns: 300px minmax(0, 1fr);
            height: calc(100vh - 64px);
        }

        .sidebar {
            background: #fafafa;
            border-right: 1px solid #e8e8e8;
            padding: 16px;
            overflow-y: auto;
        }

        .panel-card {
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.04);
            padding: 14px;
            margin-bottom: 12px;
        }

        .panel-title {
            color: var(--ek-red);
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input,
        .select,
        .button {
            width: 100%;
            border-radius: 8px;
            border: 1px solid #d9d9d9;
            background: #fff;
            color: var(--ek-dark);
            padding: 10px 12px;
            font-size: 14px;
            outline: none;
        }

        .input:focus,
        .select:focus {
            border-color: var(--ek-gold);
            box-shadow: 0 0 0 3px rgba(198, 168, 124, 0.18);
        }

        .button {
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .button-primary {
            background: var(--ek-red);
            border-color: var(--ek-red);
            color: #fff;
        }

        .button-primary:hover {
            background: var(--ek-red-dark);
            border-color: var(--ek-red-dark);
        }

        .button-subtle {
            background: #fff;
            color: var(--ek-dark);
        }

        .button-subtle:hover {
            border-color: var(--ek-gold);
            color: var(--ek-red);
            background: #fffbf5;
        }

        .stack {
            display: grid;
            gap: 8px;
        }

        .hint {
            color: #8a8a8a;
            font-size: 12px;
            line-height: 1.4;
        }

        .docs-list {
            list-style: none;
            max-height: 220px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 8px;
        }

        .docs-list li {
            border-bottom: 1px solid #f2f2f2;
        }

        .docs-list li:last-child {
            border-bottom: none;
        }

        .doc-btn {
            width: 100%;
            text-align: left;
            border: none;
            background: #fff;
            padding: 10px 12px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--ek-dark);
            transition: background 0.15s, color 0.15s;
        }

        .doc-btn i {
            color: #bbb;
            font-size: 11px;
            flex-shrink: 0;
            transition: color 0.15s;
        }

        .doc-btn:hover,
        .doc-btn.active {
            background: #fff5f5;
            color: var(--ek-red);
        }

        .doc-btn:hover i,
        .doc-btn.active i {
            color: var(--ek-red);
        }

        .viewer-wrap {
            padding: 16px;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            gap: 12px;
            min-height: 0;
        }

        .toolbar {
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            padding: 8px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }

        .toolbar .button {
            width: auto;
            padding: 7px 11px;
            min-width: 36px;
            font-size: 13px;
            border-radius: 7px;
        }

        .toolbar .input {
            width: 56px;
            text-align: center;
            padding: 7px;
        }

        .toolbar .page-text {
            font-size: 13px;
            color: var(--ek-gray);
        }

        .toolbar-sep {
            width: 1px;
            height: 24px;
            background: #e5e5e5;
            margin: 0 2px;
            flex-shrink: 0;
        }

        .zoom-label {
            font-size: 12px;
            color: var(--ek-gray);
            min-width: 42px;
            text-align: center;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .canvas-host {
            border: 1px solid #e9e9e9;
            border-radius: 12px;
            background:
                linear-gradient(135deg, rgba(215, 25, 33, 0.04), rgba(198, 168, 124, 0.08)),
                #f4f5f6;
            overflow: auto;
            display: grid;
            place-items: center;
            min-height: 0;
            padding: 18px;
            position: relative;
        }

        #pageContainer {
            display: none;
            position: relative;
            line-height: 1;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.16);
            border-radius: 2px;
        }

        #pdfCanvas {
            display: block;
            border-radius: 2px;
            background: #fff;
        }

        /* PDF.js text selection layer — overlays canvas with invisible, selectable text */
        .textLayer {
            position: absolute;
            inset: 0;
            overflow: visible;
            z-index: 2;
            line-height: 1;
            pointer-events: auto;
            user-select: text;
            -webkit-user-select: text;
        }

        .textLayer span {
            color: transparent;
            position: absolute;
            white-space: pre;
            cursor: text;
            transform-origin: 0% 0%;
            user-select: text;
            -webkit-user-select: text;
        }

        .textLayer ::selection {
            background: rgba(215, 25, 33, 0.25);
            color: transparent;
        }

        .textLayer ::-moz-selection {
            background: rgba(215, 25, 33, 0.25);
            color: transparent;
        }

        .empty-state {
            text-align: center;
            padding: 24px;
            max-width: 460px;
        }

        .empty-state i {
            font-size: 40px;
            color: #ddd;
            margin-bottom: 14px;
            display: block;
        }

        .empty-state h2 {
            color: var(--ek-dark);
            margin-bottom: 6px;
            font-size: 17px;
            font-weight: 700;
        }

        .empty-state p {
            color: var(--ek-gray);
            font-size: 13px;
            line-height: 1.6;
        }

        .loader {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 13px;
            color: var(--ek-gray);
            z-index: 10;
            border-radius: 12px;
            backdrop-filter: blur(2px);
        }

        .loader.active {
            display: flex;
        }

        .loader-spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #eee;
            border-top-color: var(--ek-red);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 980px) {
            body {
                overflow: auto;
            }

            .layout {
                grid-template-columns: 1fr;
                height: auto;
            }

            .sidebar {
                border-right: none;
                border-bottom: 1px solid #eee;
            }

            .viewer-wrap {
                min-height: 75vh;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="brand">
            <img src="favicon.png" alt="Emirates">
            <h1>Document Center</h1>
        </div>
        <div class="status-wrap">
            <span id="statusDoc" class="status-doc"></span>
            <span id="status" class="status">No document loaded</span>
        </div>
    </header>

    <main class="layout">
        <aside class="sidebar">
            <section class="panel-card">
                <div class="panel-title">Select Document</div>
                <div class="stack">
                    <select id="pdfSelect" class="select"></select>
                    <button id="openBtn" class="button button-primary"><i class="fa fa-folder-open" style="margin-right:7px;"></i>Open</button>
                    <button id="scanBtn" class="button button-subtle"><i class="fa fa-rotate" style="margin-right:7px;"></i>Refresh Documents</button>
                </div>
            </section>

            <section class="panel-card">
                <div class="panel-title">All Documents</div>
                <ul id="docsList" class="docs-list"></ul>
            </section>
        </aside>

        <section class="viewer-wrap">
            <div class="toolbar">
                <button id="prevPage" class="button button-subtle" title="Previous Page"><i class="fa fa-chevron-left"></i></button>
                <input id="pageNumber" class="input" type="number" min="1" value="1">
                <span id="pageTotal" class="page-text">/ 0</span>
                <button id="nextPage" class="button button-subtle" title="Next Page"><i class="fa fa-chevron-right"></i></button>

                <div class="toolbar-sep"></div>

                <button id="zoomOut" class="button button-subtle" title="Zoom Out"><i class="fa fa-minus"></i></button>
                <span id="zoomDisplay" class="zoom-label">180%</span>
                <button id="zoomIn" class="button button-subtle" title="Zoom In"><i class="fa fa-plus"></i></button>
                <button id="fitWidth" class="button button-subtle" title="Fit to Width"><i class="fa fa-arrows-left-right" style="margin-right:5px;"></i>Fit</button>

                <div class="toolbar-sep"></div>

                <button id="downloadPdf" class="button button-subtle" title="Download PDF"><i class="fa fa-download" style="margin-right:5px;"></i>Download</button>
                <button id="openNewTab" class="button button-subtle" title="Open in New Tab"><i class="fa fa-arrow-up-right-from-square" style="margin-right:5px;"></i>New Tab</button>
            </div>

            <div class="canvas-host" id="canvasHost">
                <div id="loader" class="loader"><div class="loader-spinner"></div>Loading document…</div>
                <div id="pageContainer">
                    <canvas id="pdfCanvas"></canvas>
                    <div id="textLayer" class="textLayer"></div>
                </div>
                <div id="emptyState" class="empty-state">
                    <i class="fa fa-file-pdf"></i>
                    <h2>No Document Open</h2>
                    <p>Select a document from the panel on the left and click <strong>Open</strong>.</p>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs";

        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs";

        const DOCS_DIR_CANDIDATES = ["./docs/", "../crew/docs/"];
        const pdfLibrary = [];
        let activeDocsDir = DOCS_DIR_CANDIDATES[0];

        let pdfDoc = null;
        let pageNum = 1;
        let scale = 1.8;
        let currentPdfPath = "";
        let isRendering = false;
        let pendingPage = null;

        const statusEl = document.getElementById("status");
        const pdfSelect = document.getElementById("pdfSelect");
        const docsList = document.getElementById("docsList");
        const canvas = document.getElementById("pdfCanvas");
        const ctx = canvas.getContext("2d", { alpha: false, desynchronized: false });
        const pageNumberInput = document.getElementById("pageNumber");
        const pageTotal = document.getElementById("pageTotal");
        const loader = document.getElementById("loader");
        const emptyState = document.getElementById("emptyState");
        const canvasHost = document.getElementById("canvasHost");
        const pageContainer = document.getElementById("pageContainer");
        const textLayerDiv = document.getElementById("textLayer");
        const zoomDisplayEl = document.getElementById("zoomDisplay");
        const statusDocEl = document.getElementById("statusDoc");

        function normalizePath(path) {
            return path.trim();
        }

        function updateStatus(message, docName = "") {
            statusEl.textContent = message;
            if (statusDocEl) statusDocEl.textContent = docName;
        }

        function setLoading(isLoading) {
            loader.classList.toggle("active", isLoading);
        }

        function updateControls() {
            pageNumberInput.value = pageNum;
            pageTotal.textContent = `/ ${pdfDoc ? pdfDoc.numPages : 0}`;
        }

        async function renderPage(num) {
            if (!pdfDoc) return;

            isRendering = true;
            const page = await pdfDoc.getPage(num);

            const dpr = window.devicePixelRatio || 1;
            const viewport = page.getViewport({ scale });
            const maxWidth = canvasHost.clientWidth - 42;
            const fitScale = Math.min(scale, maxWidth / viewport.width);
            const adjustedViewport = page.getViewport({ scale: fitScale });

            const cssW = Math.floor(adjustedViewport.width);
            const cssH = Math.floor(adjustedViewport.height);

            // Render at physical pixel resolution for crisp HiDPI output.
            canvas.width = cssW * dpr;
            canvas.height = cssH * dpr;
            canvas.style.width = cssW + "px";
            canvas.style.height = cssH + "px";

            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = "high";

            const renderTask = page.render({ canvasContext: ctx, viewport: adjustedViewport });
            await renderTask.promise;

            // Build text selection layer using stable low-level API.
            // renderTextLayer is not exported from the CDN pdf.min.mjs build;
            // we position spans manually via Util.transform instead.
            textLayerDiv.innerHTML = '';
            try {
                const { items } = await page.getTextContent();
                const frag = document.createDocumentFragment();

                for (const item of items) {
                    if (!('str' in item) || !item.str) continue;

                    // Compose text-item transform with viewport transform to get screen coords.
                    const tx = pdfjsLib.Util.transform(adjustedViewport.transform, item.transform);
                    // For upright text: tx[0]=scale*fs, tx[1]=0, tx[2]=0, tx[3]=-(scale*fs)
                    const fontH = Math.hypot(tx[0], tx[1]);
                    if (fontH < 1) continue;

                    const span = document.createElement('span');
                    span.textContent = item.str + (item.hasEOL ? ' ' : '');
                    // tx[4]/tx[5] = screen x/y of text baseline after Y-flip.
                    // Offset top by -fontH so the span covers from above baseline downward.
                    span.style.cssText = `left:${tx[4]}px;top:${tx[5] - fontH}px;font-size:${fontH}px;font-family:sans-serif;`;

                    const angle = Math.atan2(tx[1], tx[0]);
                    if (Math.abs(angle) > 0.005) {
                        span.style.transform = `rotate(${angle}rad)`;
                    }

                    frag.appendChild(span);
                }

                textLayerDiv.appendChild(frag);

                // Second pass: scaleX each span to match PDF's reported text width,
                // so selection boundaries align with individual characters.
                const validItems = items.filter(i => 'str' in i && i.str);
                Array.from(textLayerDiv.children).forEach((span, idx) => {
                    const item = validItems[idx];
                    if (!item || !item.width) return;
                    const naturalW = span.getBoundingClientRect().width;
                    if (naturalW < 1) return;
                    const targetW = item.width * adjustedViewport.scale;
                    const sx = targetW / naturalW;
                    const existing = span.style.transform;
                    span.style.transform = existing ? `${existing} scaleX(${sx})` : `scaleX(${sx})`;
                });
            } catch (_) { /* text layer is optional */ }

            pageContainer.style.display = "block";

            isRendering = false;
            if (pendingPage !== null) {
                const next = pendingPage;
                pendingPage = null;
                await renderPage(next);
                return;
            }

            updateControls();
        }

        function queueRenderPage(num) {
            if (isRendering) {
                pendingPage = num;
            } else {
                renderPage(num);
            }
        }

        function renderPdfList() {
            pdfSelect.innerHTML = "";
            docsList.innerHTML = "";

            if (!pdfLibrary.length) {
                const option = document.createElement("option");
                option.textContent = "No documents found in /docs";
                option.value = "";
                pdfSelect.appendChild(option);

                const empty = document.createElement("li");
                empty.innerHTML = '<button class="doc-btn" disabled><i class="fa fa-circle-exclamation"></i>No documents found</button>';
                docsList.appendChild(empty);
                return;
            }

            pdfLibrary.forEach((doc, index) => {
                const option = document.createElement("option");
                option.value = doc.path;
                option.textContent = doc.label;
                pdfSelect.appendChild(option);

                const li = document.createElement("li");
                const btn = document.createElement("button");
                btn.className = "doc-btn";
                btn.innerHTML = `<i class="fa fa-file-pdf"></i>${doc.label}`;
                btn.dataset.path = doc.path;
                btn.addEventListener("click", () => {
                    pdfSelect.value = doc.path;
                    openPdf(doc.path, doc.label);
                    syncActiveDocButton(doc.path);
                });

                if (index === 0) {
                    btn.classList.add("active");
                }

                li.appendChild(btn);
                docsList.appendChild(li);
            });
        }

        function syncActiveDocButton(path) {
            const buttons = docsList.querySelectorAll(".doc-btn");
            buttons.forEach((btn) => btn.classList.toggle("active", btn.dataset.path === path));
        }

        function addPdfToLibrary(path) {
            const normalized = normalizePath(path);
            if (!normalized || !normalized.toLowerCase().endsWith(".pdf")) return;
            if (pdfLibrary.some((doc) => doc.path === normalized)) return;

            const fileName = normalized.split("/").pop() || normalized;
            const label = fileName.replace(/\.pdf$/i, "");
            pdfLibrary.push({ label, path: normalized });
        }

        async function scanDocsViaGithubPagesApi(docsDir) {
            const host = window.location.hostname.toLowerCase();
            if (!host.endsWith(".github.io")) return;

            const owner = host.replace(".github.io", "");
            const pathParts = window.location.pathname.split("/").filter(Boolean);
            if (!pathParts.length) return;

            const repo = pathParts[0];

            const repoResponse = await fetch(`https://api.github.com/repos/${owner}/${repo}`);
            if (!repoResponse.ok) return;

            const repoInfo = await repoResponse.json();
            const branch = repoInfo.default_branch || "main";

            const cleanDocsDir = docsDir.replace(/^\.\//, "").replace(/\/+$/, "");
            const contentsUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${cleanDocsDir}?ref=${branch}`;
            const response = await fetch(contentsUrl);
            if (!response.ok) return;

            const items = await response.json();
            if (!Array.isArray(items)) return;

            items.forEach((item) => {
                if (item.type !== "file") return;
                if (!String(item.name || "").toLowerCase().endsWith(".pdf")) return;

                // Use same-origin path so it also works with private path rules/CDN caches.
                addPdfToLibrary(`${docsDir}${item.name}`);
            });
        }

        async function scanDocsFolder() {
            setLoading(true);
            updateStatus("Scanning docs folders for PDFs...");

            pdfLibrary.length = 0;

            for (const docsDir of DOCS_DIR_CANDIDATES) {
                try {
                    // Preferred mode: parse directory listing if host exposes links.
                    const listingResponse = await fetch(docsDir, { cache: "no-store" });
                    if (listingResponse.ok) {
                        const html = await listingResponse.text();
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(html, "text/html");
                        const links = Array.from(doc.querySelectorAll("a[href]"));

                        links.forEach((linkEl) => {
                            const href = linkEl.getAttribute("href") || "";
                            if (!href || href.startsWith("#") || href.startsWith("?")) return;

                            const cleanHref = href.split("#")[0].split("?")[0];
                            if (!cleanHref.toLowerCase().endsWith(".pdf")) return;

                            const absolute = new URL(cleanHref, docsDir);
                            const fileName = decodeURIComponent(absolute.pathname.split("/").pop() || "");
                            if (fileName.toLowerCase().endsWith(".pdf")) {
                                addPdfToLibrary(`${docsDir}${fileName}`);
                            }
                        });
                    }
                } catch (error) {
                    // Fall through to JSON index and API fallback.
                }

                if (!pdfLibrary.length) {
                    try {
                        // Fallback mode for hosts without directory listing.
                        const indexResponse = await fetch(`${docsDir}index.json`, { cache: "no-store" });
                        if (indexResponse.ok) {
                            const entries = await indexResponse.json();
                            if (Array.isArray(entries)) {
                                entries.forEach((entry) => {
                                    if (typeof entry === "string") {
                                        addPdfToLibrary(`${docsDir}${entry.replace(/^\/+/, "")}`);
                                    }
                                });
                            }
                        }
                    } catch (error) {
                        // No index fallback in this folder.
                    }
                }

                if (!pdfLibrary.length) {
                    try {
                        // GitHub Pages usually blocks folder listing; API fallback keeps UI simple.
                        await scanDocsViaGithubPagesApi(docsDir);
                    } catch (error) {
                        // API fallback unavailable for this folder.
                    }
                }

                if (pdfLibrary.length) {
                    activeDocsDir = docsDir;
                    break;
                }
            }

            renderPdfList();

            if (!pdfLibrary.length) {
                updateStatus("No PDFs detected in docs folders");
                setLoading(false);
                return;
            }

            pdfSelect.value = pdfLibrary[0].path;
            updateStatus(`Detected ${pdfLibrary.length} PDF(s) in ${activeDocsDir}`);
            setLoading(false);
        }

        async function openPdf(path, displayLabel = "Custom PDF") {
            const normalized = normalizePath(path);
            if (!normalized) return;

            setLoading(true);
            updateStatus("Loading document...");

            try {
                const loadingTask = pdfjsLib.getDocument({ url: normalized, withCredentials: false });
                pdfDoc = await loadingTask.promise;
                currentPdfPath = normalized;
                pageNum = 1;
                emptyState.style.display = "none";
                await renderPage(pageNum);
                updateStatus(`${pdfDoc.numPages} pages`, displayLabel);
                syncActiveDocButton(normalized);
            } catch (error) {
                updateStatus("Unable to open PDF");
                alert(`Failed to load PDF: ${error.message}`);
            } finally {
                setLoading(false);
                updateControls();
            }
        }

        function openSelectedPdf() {
            const path = pdfSelect.value;
            const label = pdfSelect.options[pdfSelect.selectedIndex]?.textContent || "Selected PDF";
            openPdf(path, label);
        }

        function changePage(nextPage) {
            if (!pdfDoc) return;
            if (nextPage < 1 || nextPage > pdfDoc.numPages) return;
            pageNum = nextPage;
            queueRenderPage(pageNum);
        }

        function updateZoomDisplay() {
            if (zoomDisplayEl) zoomDisplayEl.textContent = Math.round(scale * 100) + "%";
        }

        function adjustZoom(delta) {
            if (!pdfDoc) return;
            scale = Math.max(0.4, Math.min(3.2, +(scale + delta).toFixed(2)));
            updateZoomDisplay();
            queueRenderPage(pageNum);
        }

        function fitToWidth() {
            if (!pdfDoc) return;
            scale = 10;
            updateZoomDisplay();
            queueRenderPage(pageNum);
        }

        document.getElementById("openBtn").addEventListener("click", openSelectedPdf);
        document.getElementById("scanBtn").addEventListener("click", scanDocsFolder);

        document.getElementById("prevPage").addEventListener("click", () => changePage(pageNum - 1));
        document.getElementById("nextPage").addEventListener("click", () => changePage(pageNum + 1));
        document.getElementById("zoomIn").addEventListener("click", () => adjustZoom(0.15));
        document.getElementById("zoomOut").addEventListener("click", () => adjustZoom(-0.15));
        document.getElementById("fitWidth").addEventListener("click", fitToWidth);

        pageNumberInput.addEventListener("change", (event) => {
            const val = Number(event.target.value);
            if (Number.isInteger(val)) {
                changePage(val);
            } else {
                updateControls();
            }
        });

        document.getElementById("downloadPdf").addEventListener("click", () => {
            if (!currentPdfPath) return;
            window.open(currentPdfPath, "_blank", "noopener,noreferrer");
        });

        document.getElementById("openNewTab").addEventListener("click", () => {
            if (!currentPdfPath) return;
            const viewerUrl = `${window.location.pathname}?pdf=${encodeURIComponent(currentPdfPath)}`;
            window.open(viewerUrl, "_blank", "noopener,noreferrer");
        });

        window.addEventListener("resize", () => {
            if (pdfDoc) queueRenderPage(pageNum);
        });

        (function init() {
            renderPdfList();
            updateZoomDisplay();

            const url = new URL(window.location.href);
            const urlPdf = url.searchParams.get("pdf");

            if (urlPdf) {
                openPdf(urlPdf, "Shared PDF");
                return;
            }

            scanDocsFolder();
        })();
    </script>
</body>
</html>
