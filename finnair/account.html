<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My account | Finnair</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary-900:#0c0243; --primary-800:#181458; --primary-700:#201d64; --primary-600:#27266e; --primary-400:#494989; --primary-300:#66679b; --primary-100:#bbbcd4; --primary-50:#e4e4ee;
    --secondary-800:#6f1b81; --secondary-700:#7e1f89; --secondary-600:#8f2591; --secondary-200:#cf92ca; --secondary-50:#f3e5f2;
    --tertiary-900:#161616; --tertiary-800:#353535; --tertiary-700:#545454; --tertiary-600:#676767; --tertiary-500:#8f8f8f; --tertiary-400:#afafaf; --tertiary-300:#d3d3d3; --tertiary-200:#e5e5e5; --tertiary-100:#f0f0f0; --tertiary-50:#f8f8f8;
    --navy:var(--primary-900); --navy-light:var(--primary-400); --ice:var(--primary-100); --ice-light:var(--primary-50); --ice-bg:var(--secondary-50);
    --white:#fff; --text-grey:var(--tertiary-600); --font:'DM Sans',sans-serif;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:var(--font); color:var(--navy); background:linear-gradient(140deg,#f7f7fc,#eef0f8); min-height:100vh; }
  .wrap { max-width:980px; margin:0 auto; padding:1.2rem; }
  .top { display:flex; justify-content:space-between; margin-bottom:1rem; }
  .top a { text-decoration:none; color:var(--navy); font-weight:700; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:.8rem; }
  .card { background:var(--white); border:1px solid var(--ice-light); border-radius:12px; padding:1rem; box-shadow:0 12px 28px rgba(12,2,67,.08); }
  .label { font-size:.76rem; color:#66679b; font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
  .value { margin-top:.3rem; font-size:1.4rem; font-weight:700; }
  .section { margin-top:.8rem; }
  table { width:100%; border-collapse:collapse; margin-top:.45rem; }
  th, td { text-align:left; padding:.6rem .45rem; border-bottom:1px solid var(--ice-light); font-size:.86rem; }
  th { font-size:.74rem; text-transform:uppercase; color:#66679b; }
  .actions { display:flex; gap:.55rem; margin-top:.9rem; }
  .btn { border:none; border-radius:999px; padding:.5rem .9rem; font:inherit; font-size:.84rem; font-weight:700; cursor:pointer; }
  .btn-primary { background:var(--navy); color:#fff; }
  .btn-primary:hover { background:var(--navy-light); }
  .btn-ghost { border:1px solid var(--ice); background:#fff; color:var(--navy); }
  .btn-ghost:hover { background:var(--ice-bg); }
  .status { margin-top:.7rem; font-size:.84rem; color:var(--text-grey); }
  @media (max-width:900px){ .grid { grid-template-columns:1fr; } }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a href="home.html">Finnair</a>
      <a href="home.html">Back to home</a>
    </div>

    <div class="grid">
      <section class="card">
        <div class="label">User</div>
        <div class="value" id="user">-</div>
      </section>
      <section class="card">
        <div class="label">Avios balance</div>
        <div class="value" id="avios">-</div>
      </section>
      <section class="card">
        <div class="label">Bookings</div>
        <div class="value" id="booking-count">-</div>
      </section>
    </div>

    <section class="card section">
      <div class="label">Recent bookings</div>
      <table>
        <thead>
          <tr><th>Reference</th><th>Route</th><th>Depart</th><th>Return</th></tr>
        </thead>
        <tbody id="bookings-body"></tbody>
      </table>

      <div class="actions">
        <button class="btn btn-primary" id="refresh">Refresh</button>
        <button class="btn btn-ghost" id="logout">Logout</button>
      </div>
      <div class="status" id="status">Loading account data...</div>
    </section>
  </div>

<script>
  const API_BASE = (window.FINNAIR_API_BASE_URL || localStorage.getItem('finnair_api_base_url') || 'http://localhost:8787').replace(/\/$/, '');
  let accessToken = localStorage.getItem('finnair_api_token') || '';
  let refreshToken = localStorage.getItem('finnair_api_refresh_token') || '';

  if (!accessToken && !refreshToken) {
    window.location.href = 'login.html?returnTo=account.html';
  }

  function setStatus(message) {
    document.getElementById('status').textContent = message;
  }

  async function refreshAccessToken() {
    if (!refreshToken) return false;
    try {
      const res = await fetch(API_BASE + '/oauth/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ grant_type: 'refresh_token', refresh_token: refreshToken, client_id: 'finnair-web' })
      });
      if (!res.ok) return false;
      const payload = await res.json();
      accessToken = payload.access_token || '';
      refreshToken = payload.refresh_token || '';
      if (accessToken) localStorage.setItem('finnair_api_token', accessToken);
      if (refreshToken) localStorage.setItem('finnair_api_refresh_token', refreshToken);
      return !!accessToken;
    } catch (_err) {
      return false;
    }
  }

  async function api(path, retry = true) {
    const res = await fetch(API_BASE + path, {
      headers: { Authorization: 'Bearer ' + accessToken }
    });
    if (res.status === 401 && retry) {
      const ok = await refreshAccessToken();
      if (ok) return api(path, false);
    }
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  function renderBookings(items) {
    const body = document.getElementById('bookings-body');
    body.innerHTML = '';
    if (!items.length) {
      const row = document.createElement('tr');
      row.innerHTML = '<td colspan="4">No bookings yet.</td>';
      body.appendChild(row);
      return;
    }
    items.slice(0, 8).forEach(item => {
      const row = document.createElement('tr');
      row.innerHTML = '<td>' + item.reference + '</td><td>' + item.from + ' -> ' + item.to + '</td><td>' + (item.depart || '-') + '</td><td>' + (item.return || '-') + '</td>';
      body.appendChild(row);
    });
  }

  async function load() {
    try {
      setStatus('Loading...');
      const [summary, bookings] = await Promise.all([api('/api/me/summary'), api('/api/bookings')]);
      document.getElementById('user').textContent = summary.user;
      document.getElementById('avios').textContent = summary.avios;
      document.getElementById('booking-count').textContent = summary.bookings;
      renderBookings(bookings.items || []);
      setStatus('Account is up to date.');
    } catch (_err) {
      setStatus('Session expired. Please log in again.');
      localStorage.removeItem('finnair_api_token');
      localStorage.removeItem('finnair_api_refresh_token');
      setTimeout(() => {
        window.location.href = 'login.html?returnTo=account.html';
      }, 700);
    }
  }

  document.getElementById('refresh').addEventListener('click', load);
  document.getElementById('logout').addEventListener('click', async () => {
    try {
      if (refreshToken) {
        await fetch(API_BASE + '/oauth/revoke', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ refresh_token: refreshToken })
        });
      }
    } catch (_err) {
      // Best-effort revoke.
    }
    localStorage.removeItem('finnair_api_token');
    localStorage.removeItem('finnair_api_refresh_token');
    localStorage.removeItem('finnair_api_user');
    window.location.href = 'login.html';
  });

  load();
</script>
</body>
</html>
