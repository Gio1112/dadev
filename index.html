<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>giorgio@terminal:~$</title>
  <link rel="icon" href="https://win98icons.alexmeub.com/icons/png/computer_explorer-4.png" />
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #39ff8a;
      --green2:  #22c55e;
      --green3:  #16a34a;
      --dim:     #1a3a27;
      --amber:   #fbbf24;
      --red:     #f87171;
      --blue:    #60a5fa;
      --purple:  #a78bfa;
      --bg:      #050a07;
      --bg2:     #0a120d;
      --text:    #d4fde4;
      --muted:   #4d7a5e;
      --border:  #1c3a28;
      --scan:    rgba(0,0,0,0.18);
      --glow:    0 0 12px rgba(57,255,138,0.25);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      overflow: hidden;
    }

 
    body::before {
      content: '';
      pointer-events: none;
      position: fixed; inset: 0; z-index: 9998;
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          var(--scan) 2px,
          var(--scan) 4px
        );
      animation: flicker 8s infinite;
    }

    body::after {
      content: '';
      pointer-events: none;
      position: fixed; inset: 0; z-index: 9999;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.75) 100%);
    }

    @keyframes flicker {
      0%,100% { opacity: 1; }
      92%      { opacity: 1; }
      93%      { opacity: 0.95; }
      94%      { opacity: 1; }
      96%      { opacity: 0.97; }
      97%      { opacity: 1; }
    }

    
    #terminal {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 980px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    #topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .dot { width: 11px; height: 11px; border-radius: 50%; }
    .dot.r { background: #ff5f56; box-shadow: 0 0 6px #ff5f5680; }
    .dot.y { background: #ffbd2e; box-shadow: 0 0 6px #ffbd2e80; }
    .dot.g { background: #27c93f; box-shadow: 0 0 6px #27c93f80; }

    #topbar-title {
      flex: 1;
      text-align: center;
      font-family: 'VT323', monospace;
      font-size: 1.1rem;
      color: var(--muted);
      letter-spacing: 2px;
    }

    #visitor-badge {
      font-size: 0.65rem;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: 3px;
    }

   
    #output {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem 0 0.5rem;
      scroll-behavior: smooth;
    }

    #output::-webkit-scrollbar { width: 4px; }
    #output::-webkit-scrollbar-track { background: transparent; }
    #output::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

    
    #input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid var(--border);
      padding: 10px 0;
      flex-shrink: 0;
    }

    #prompt-label {
      white-space: nowrap;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    #prompt-label .u { color: var(--green); font-weight: 700; }
    #prompt-label .sep { color: var(--muted); }
    #prompt-label .dir { color: var(--blue); }

    #cmd-input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--green);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      flex: 1;
      caret-color: var(--green);
    }

    
    .line {
      font-size: 0.82rem;
      line-height: 1.65;
      padding: 1px 0;
    }

    .line.cmd {
      display: flex;
      gap: 8px;
      margin-top: 0.6rem;
      color: var(--green);
      font-weight: 500;
    }
    .line.cmd .ps1 { color: var(--muted); flex-shrink: 0; }

    .line.out  { color: var(--text); padding-left: 4px; }
    .line.err  { color: var(--red); }
    .line.info { color: var(--muted); }
    .line.blank { height: 0.5rem; }

    .section-head {
      font-family: 'VT323', monospace;
      font-size: 1.35rem;
      letter-spacing: 3px;
      color: var(--green);
      text-shadow: var(--glow);
      border-bottom: 1px solid var(--border);
      padding-bottom: 2px;
      margin-bottom: 6px;
    }

    
    .about-block { padding: 4px 0 4px 12px; border-left: 2px solid var(--green3); }
    .about-block p { color: var(--text); font-size: 0.8rem; line-height: 1.8; }
    .about-block .label { color: var(--amber); }

     
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 4px 16px;
      padding-left: 4px;
    }

    .skill-item {
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text);
    }
    .skill-item .check { color: var(--green); }
    .skill-item .bar {
      flex: 1;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
    }
    .skill-item .bar-fill {
      height: 100%;
      background: var(--green2);
      box-shadow: 0 0 4px var(--green2);
      animation: grow 1.2s ease forwards;
    }
    @keyframes grow { from { width: 0; } }


    .project-card {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 12px;
      margin-bottom: 6px;
      background: var(--bg2);
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .project-card:hover {
      border-color: var(--green3);
      box-shadow: var(--glow);
    }
    .project-card .proj-name {
      color: var(--purple);
      font-weight: 700;
      font-size: 0.82rem;
    }
    .project-card .proj-lang {
      font-size: 0.7rem;
      color: var(--muted);
      margin-left: 8px;
    }
    .project-card .proj-desc {
      color: var(--text);
      font-size: 0.78rem;
      margin-top: 2px;
    }
    .project-card .proj-link {
      color: var(--blue);
      font-size: 0.7rem;
      text-decoration: none;
      margin-top: 3px;
      display: inline-block;
    }
    .project-card .proj-link:hover { text-decoration: underline; }

    
    .contact-row {
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 0.8rem;
      padding: 2px 0;
    }
    .contact-row .key { color: var(--amber); min-width: 70px; }
    .contact-row a { color: var(--blue); text-decoration: none; }
    .contact-row a:hover { text-decoration: underline; }

    
    .help-table { border-collapse: collapse; font-size: 0.78rem; }
    .help-table td { padding: 2px 16px 2px 4px; }
    .help-table td:first-child { color: var(--green); font-weight: 600; min-width: 110px; }
    .help-table td:last-child { color: var(--muted); }

    
    .ascii {
      font-family: 'VT323', monospace;
      font-size: 1.05rem;
      color: var(--green);
      line-height: 1.15;
      text-shadow: var(--glow);
      white-space: pre;
    }

    
    .tcursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: var(--green);
      vertical-align: middle;
      animation: blink 0.9s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    
    .prog-wrap { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; }
    .prog-bar {
      flex: 1;
      max-width: 200px;
      height: 6px;
      background: var(--dim);
      border-radius: 2px;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green3), var(--green));
      box-shadow: 0 0 6px var(--green2);
    }

    
    #output { scrollbar-width: thin; scrollbar-color: var(--dim) transparent; }
  </style>
</head>
<body>
<div id="terminal">
  
  <div id="topbar">
    <div class="dot r"></div>
    <div class="dot y"></div>
    <div class="dot g"></div>
    <div id="topbar-title">giorgio@terminal: ~/portfolio</div>
    <div id="visitor-badge">⬤ online</div>
  </div>

  
  <div id="output"></div>

  
  <div id="input-row">
    <div id="prompt-label">
      <span class="u">giorgio</span><span class="sep">@</span><span class="u">terminal</span><span class="sep">:</span><span class="dir">~</span><span class="sep">$</span>
    </div>
    <input id="cmd-input" type="text" autocomplete="off" spellcheck="false" autocorrect="off" />
  </div>
</div>

<script>
(() => {
  const out    = document.getElementById('output');
  const input  = document.getElementById('cmd-input');
  const badge  = document.getElementById('visitor-badge');

  
  const delay = ms => new Promise(r => setTimeout(r, ms));

  function appendRaw(html) {
    const d = document.createElement('div');
    d.innerHTML = html;
    out.appendChild(d);
    out.scrollTop = out.scrollHeight;
  }

  function line(cls, html) {
    appendRaw(`<div class="line ${cls}">${html}</div>`);
  }

  function cmdLine(cmd) {
    line('cmd', `<span class="ps1">giorgio@terminal:~$</span> <span>${cmd}</span>`);
  }

  function blank() { line('blank', ''); }

  
  (async () => {
    try {
      const r = await fetch('https://api.counterapi.dev/v1/giorgio-is-a-dev/visits/up');
      const d = await r.json();
      badge.textContent = `⬤ ${d.count} visitors`;
    } catch { badge.textContent = '⬤ online'; }
  })();

  
  async function typeCmd(cmd, ms = 45) {
    // Show fake prompt with typing
    const row = document.createElement('div');
    row.className = 'line cmd';
    row.innerHTML = `<span class="ps1">giorgio@terminal:~$</span> <span id="_typing"></span><span class="tcursor"></span>`;
    out.appendChild(row);
    out.scrollTop = out.scrollHeight;

    const span = document.getElementById('_typing');
    for (const ch of cmd) {
      span.textContent += ch;
      await delay(ms + Math.random() * 20);
    }
    // Remove cursor, freeze
    row.querySelector('.tcursor').remove();
    await delay(180);
  }

  
  function showBanner() {
    appendRaw(`<div class="line out" style="margin-bottom:4px;">
<pre class="ascii">
  ██████╗ ██╗ ██████╗ ██████╗  ██████╗ ██╗ ██████╗ 
 ██╔════╝ ██║██╔═══██╗██╔══██╗██╔════╝ ██║██╔═══██╗
 ██║  ███╗██║██║   ██║██████╔╝██║  ███╗██║██║   ██║
 ██║   ██║██║██║   ██║██╔══██╗██║   ██║██║██║   ██║
 ╚██████╔╝██║╚██████╔╝██║  ██║╚██████╔╝██║╚██████╔╝
  ╚═════╝ ╚═╝ ╚═════╝ ╚═╝  ╚═╝ ╚═════╝ ╚═╝ ╚═════╝
</pre></div>`);

    line('info', '  v1.0.0  &nbsp;·&nbsp;  portfolio terminal  &nbsp;·&nbsp;  type <span style="color:var(--green)">help</span> for commands');
    blank();
  }

  function showAbout() {
    blank();
    appendRaw(`<div class="line out"><div class="section-head">// WHOAMI</div></div>`);
    appendRaw(`<div class="line out">
      <div class="about-block">
        <p><span class="label">name     </span>  Giorgio</p>
        <p><span class="label">age      </span>  15 &nbsp;<span style="color:var(--muted)">// born in Italy</span></p>
        <p><span class="label">location </span>  Italy &nbsp;<span style="color:var(--muted)">🇮🇹</span></p>
        <p><span class="label">passion  </span>  planes, code, side-projects</p>
        <p><span class="label">origin   </span>  started on Scratch at 8, then Python, never stopped</p>
        <p><span class="label">now      </span>  full-stack JS/TS, Discord bots, Roblox airline systems</p>
      </div>
    </div>`);
    blank();
  }

  function showSkills() {
    blank();
    appendRaw(`<div class="line out"><div class="section-head">// SKILLS</div></div>`);
    const skills = [
      { name: 'JavaScript (ES6+)', pct: 90 },
      { name: 'TypeScript',        pct: 78 },
      { name: 'Python 3',          pct: 72 },
      { name: 'React / Next.js',   pct: 68 },
      { name: 'Node.js / Express', pct: 85 },
      { name: 'Discord.js',        pct: 92 },
      { name: 'MongoDB / Atlas',   pct: 75 },
      { name: 'Tailwind CSS',      pct: 80 },
      { name: 'Rust (learning)',   pct: 25 },
      { name: 'C++ (learning)',    pct: 20 },
    ];
    const grid = document.createElement('div');
    grid.className = 'line out skills-grid';
    skills.forEach(s => {
      const el = document.createElement('div');
      el.className = 'skill-item';
      el.innerHTML = `<span class="check">✓</span><span style="min-width:155px">${s.name}</span><div class="bar"><div class="bar-fill" style="width:${s.pct}%"></div></div>`;
      grid.appendChild(el);
    });
    out.appendChild(grid);
    out.scrollTop = out.scrollHeight;
    blank();
  }

  function showProjects() {
    blank();
    appendRaw(`<div class="line out"><div class="section-head">// PROJECTS</div></div>`);
    const projects = [
      {
        name: 'atmos_rewards/',
        lang: '[Node.js · MongoDB · Discord.js]',
        desc: 'Full loyalty program system for PTFS virtual airline — tier progression, rewards shop, Discord OAuth2 dashboard.',
        link: 'https://github.com/Gio1112',
        href: 'https://github.com/Gio1112',
      },
      {
        name: 'korean_air_web.js',
        lang: '[Node.js · Express · HTML/CSS]',
        desc: 'Full-stack mock booking portal for Korean Air virtual airline with seat maps and admin panel.',
        link: 'github.com/Gio1112/korean-air',
        href: 'https://github.com/Gio1112/korean-air',
      },
      {
        name: 'swiss_air_web.ts',
        lang: '[Next.js · TypeScript · Tailwind]',
        desc: 'Next.js frontend rebuild of Swiss Airlines virtual portal with modern stack.',
        link: 'giorgio.is-a.dev/swiss',
        href: 'https://giorgio.is-a.dev/swiss',
      },
      {
        name: 'TrackLab/',
        lang: '[Electron · JS · Scratch-DSL]',
        desc: 'Visual block-coding IDE for Subway Builder game mods — drag-drop, undo/redo, ZIP export.',
        link: 'github.com/Gio1112',
        href: 'https://github.com/Gio1112',
      },
      {
        name: 'cord.dsl',
        lang: '[Custom Language · Node.js]',
        desc: 'Custom DSL that transpiles to Discord bot JavaScript. Features user-defined functions, --watch mode, Ollama AI integration.',
        link: 'github.com/Gio1112',
        href: 'https://github.com/Gio1112',
      },
    ];
    projects.forEach(p => {
      const card = document.createElement('div');
      card.className = 'project-card';
      card.innerHTML = `
        <div><span class="proj-name">${p.name}</span><span class="proj-lang">${p.lang}</span></div>
        <div class="proj-desc">${p.desc}</div>
        <a class="proj-link" href="${p.href}" target="_blank">↗ ${p.link}</a>
      `;
      card.addEventListener('click', () => window.open(p.href, '_blank'));
      out.appendChild(card);
      out.scrollTop = out.scrollHeight;
    });
    blank();
  }

  function showContact() {
    blank();
    appendRaw(`<div class="line out"><div class="section-head">// CONTACT</div></div>`);
    appendRaw(`
      <div class="line out">
        <div class="contact-row"><span class="key">email</span><a href="mailto:giorgiodabest1@gmail.com">giorgiodabest1@gmail.com</a></div>
        <div class="contact-row"><span class="key">discord</span><span style="color:var(--text)">giorgiodabest</span></div>
        <div class="contact-row"><span class="key">github</span><a href="https://github.com/Gio1112" target="_blank">github.com/Gio1112</a></div>
        <div class="contact-row"><span class="key">website</span><a href="https://giorgio.is-a.dev" target="_blank">giorgio.is-a.dev</a></div>
      </div>
    `);
    blank();
  }

  function showHelp() {
    blank();
    appendRaw(`<div class="line out"><div class="section-head">// HELP</div></div>`);
    appendRaw(`<div class="line out">
      <table class="help-table">
        <tr><td>whoami</td><td>about me</td></tr>
        <tr><td>skills</td><td>tech stack & proficiency</td></tr>
        <tr><td>projects</td><td>stuff I've built</td></tr>
        <tr><td>contact</td><td>how to reach me</td></tr>
        <tr><td>clear</td><td>wipe the terminal</td></tr>
        <tr><td>banner</td><td>redisplay ascii header</td></tr>
        <tr><td>help</td><td>this menu</td></tr>
      </table>
    </div>`);
    blank();
  }

  const history = [];
  let histIdx = -1;

  function runCmd(raw) {
    const cmd = raw.trim().toLowerCase();
    if (!cmd) return;
    history.unshift(raw);
    histIdx = -1;

    cmdLine(raw);

    switch (cmd) {
      case 'whoami':
      case 'about':   showAbout();    break;
      case 'skills':  showSkills();   break;
      case 'projects':showProjects(); break;
      case 'contact': showContact();  break;
      case 'help':    showHelp();     break;
      case 'banner':  showBanner();   break;
      case 'clear':
        out.innerHTML = '';
        showBanner();
        break;
      default:
        blank();
        line('err', `bash: ${raw}: command not found`);
        line('info', `type <span style="color:var(--green)">help</span> to see available commands`);
        blank();
    }
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const val = input.value;
      input.value = '';
      runCmd(val);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (histIdx < history.length - 1) { histIdx++; input.value = history[histIdx]; }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (histIdx > 0) { histIdx--; input.value = history[histIdx]; }
      else { histIdx = -1; input.value = ''; }
    }
  });

  // Keep focus
  document.addEventListener('click', () => {
    if (!window.getSelection().toString()) input.focus();
  });
  input.focus();

  
  async function boot() {
    // Progress lines
    const steps = [
      '[  0.001] Kernel 6.8.0-generic loaded',
      '[  0.042] ACPI: IRQ0 configuration ...',
      '[  0.108] PCI: MSI quirk detected',
      '[  0.220] net: registered protocol family 2',
      '[  0.580] systemd[1]: Starting portfolio.service',
      '[  1.002] portfolio.service started OK',
    ];
    for (const s of steps) {
      line('info', s);
      await delay(90);
    }
    blank();

    await typeCmd('cat /etc/motd', 38);
    showBanner();
    await delay(200);

    await typeCmd('whoami', 55);
    showAbout();
    await delay(150);

    await typeCmd('ls --projects', 50);
    showProjects();
    await delay(150);

    await typeCmd('help', 60);
    showHelp();

    // Ready indicator
    line('info', '<span style="color:var(--green)">■</span> Terminal ready. Type a command below.');
    blank();
    input.focus();
  }

  boot();
})();
</script>
</body>
</html>
